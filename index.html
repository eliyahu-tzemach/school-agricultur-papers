<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>החווה הקטנה והמטריפה - דף משימה וחיבור לגיליון</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #fefbeb; color: #292524; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .hide { display: none; }
        .mission-card { transition: all 0.3s ease; cursor: pointer; border: 2px solid #e5e7eb; }
        .mission-card.active { border-color: #059669; background-color: #ecfdf5; box-shadow: 0 0 0 2px #059669; }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-emerald-800 text-white py-6 shadow-lg border-b-4 border-amber-500">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold italic">🚜 החווה הקטנה והמטריפה</h1>
                <p id="auth-status" class="text-emerald-200 text-sm">מתחבר למערכת...</p>
            </div>
            <button onclick="toggleTeacherView()" class="text-xs bg-emerald-700 hover:bg-emerald-600 px-3 py-1 rounded border border-emerald-500 opacity-70 hover:opacity-100 transition-opacity">כניסת מורה 🔒</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10 space-y-12">
        <!-- גרף מגוון ביולוגי -->
        <section class="glass-panel p-6 rounded-2xl shadow-sm border border-emerald-100">
            <h2 class="text-2xl font-bold text-emerald-900 mb-4">🌱 מגוון ביולוגי בחווה</h2>
            <div class="h-[200px] bg-white p-2 rounded-lg"><canvas id="biodiversityChart"></canvas></div>
        </section>

        <!-- פרטי תלמיד -->
        <section class="glass-panel p-6 rounded-2xl bg-white border-t-4 border-emerald-600 shadow-md">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">שם מלא:</label>
                    <input type="text" id="studentName" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">מזהה מערכת:</label>
                    <input type="text" id="studentIdDisplay" readonly class="w-full p-3 border rounded-lg bg-gray-100 text-gray-400 text-sm">
                </div>
            </div>
        </section>

        <!-- בחירת משימה -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="mission-card bg-white p-6 rounded-2xl text-center shadow-sm" id="card-opt1" onclick="selectOption('opt1')">
                <div class="text-5xl mb-3">🦉</div>
                <h3 class="font-bold">כרטיס ביקור</h3>
            </div>
            <div class="mission-card bg-white p-6 rounded-2xl text-center shadow-sm" id="card-opt2" onclick="selectOption('opt2')">
                <div class="text-5xl mb-3">💧</div>
                <h3 class="font-bold">חוסן ועמידות</h3>
            </div>
            <div class="mission-card bg-white p-6 rounded-2xl text-center shadow-sm" id="card-opt3" onclick="selectOption('opt3')">
                <div class="text-5xl mb-3">🔍</div>
                <h3 class="font-bold">התבוננות</h3>
            </div>
        </section>

        <section id="form-container" class="hide">
            <div id="content-opt1" class="hide form-content glass-panel p-6 rounded-2xl border-2 border-emerald-500 bg-white">
                <h3 class="font-bold mb-2">משימה 1: פירוט תשובה</h3>
                <textarea id="opt1-ans" class="w-full p-4 border rounded-xl h-32 focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
            </div>
            <div id="content-opt2" class="hide form-content glass-panel p-6 rounded-2xl border-2 border-blue-500 bg-white">
                <h3 class="font-bold mb-2">משימה 2: פירוט תשובה</h3>
                <textarea id="opt2-ans" class="w-full p-4 border rounded-xl h-32 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>
            <div id="content-opt3" class="hide form-content glass-panel p-6 rounded-2xl border-2 border-amber-500 bg-white">
                <h3 class="font-bold mb-2">משימה 3: פירוט תשובה</h3>
                <textarea id="opt3-ans" class="w-full p-4 border rounded-xl h-32 focus:ring-2 focus:ring-amber-500 outline-none"></textarea>
            </div>
        </section>

        <!-- שאלת חובה -->
        <section class="glass-panel p-8 rounded-2xl border-l-8 border-red-500 bg-white shadow-lg">
            <h3 class="text-xl font-bold text-red-800 mb-2">🚩 שאלת חובה</h3>
            <p class="text-sm text-gray-500 mb-4">"הבעיה היא הפתרון" - תנו דוגמה מהסרט:</p>
            <textarea id="mandatoryAnswer" rows="4" class="w-full p-4 border-2 border-red-50 rounded-xl focus:border-red-500 outline-none"></textarea>
        </section>

        <div class="text-center pb-12">
            <button id="save-btn" class="bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 px-12 rounded-full shadow-lg flex items-center gap-3 mx-auto transition-all active:scale-95">
                <span id="btn-text">שלח/י עבודה ושמור/י בגיליון</span>
                <div id="btn-spinner" class="loading-spinner hidden"></div>
            </button>
            <p id="save-status" class="mt-4 font-bold"></p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // תיקון: הכתובת עטופה בגרשיים
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbz3Aj1i69JmMR0Bd60fW9crx4rfdDaNq0fLTJLj6KV88NkQ0Yav7lpbafkgGf8kDUUS/exec"; 

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let rawAppId = typeof __app_id !== 'undefined' ? __app_id : 'farm-sheets-v1';
        const appId = rawAppId.replace(/[.#$\[\]]/g, '_'); 

        let user = null;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('studentIdDisplay').value = u.uid;
                document.getElementById('auth-status').innerText = "מחובר ✅";
                loadStudentData(u.uid);
            }
        });

        initAuth();

        async function loadStudentData(uid) {
            if (!uid || !appId) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', uid);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('studentName').value = d.studentName || "";
                    if (d.selectedOption) selectOption(d.selectedOption.replace('card-', ''));
                    document.getElementById('opt1-ans').value = d.opt1Ans || "";
                    document.getElementById('opt2-ans').value = d.opt2Ans || "";
                    document.getElementById('opt3-ans').value = d.opt3Ans || "";
                    document.getElementById('mandatoryAnswer').value = d.mandatoryAnswer || "";
                }
            } catch (error) { console.error(error); }
        }

        window.saveData = async () => {
            if (!user || !appId) return;
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('save-status');
            const spinner = document.getElementById('btn-spinner');
            
            btn.disabled = true;
            spinner.classList.remove('hidden');
            status.innerText = "שולח נתונים...";
            
            const activeCard = document.querySelector('.mission-card.active');
            const activeId = activeCard ? activeCard.id.replace('card-', '') : '';
            const missionAns = document.getElementById(activeId + '-ans')?.value || "";

            const payload = {
                timestamp: new Date().toLocaleString('he-IL'),
                studentName: document.getElementById('studentName').value || "ללא שם",
                uid: user.uid,
                selectedOption: activeCard ? activeCard.id : "לא נבחר",
                mandatoryAnswer: document.getElementById('mandatoryAnswer').value,
                missionAnswer: missionAns,
                opt1Ans: document.getElementById('opt1-ans').value,
                opt2Ans: document.getElementById('opt2-ans').value,
                opt3Ans: document.getElementById('opt3-ans').value,
            };

            try {
                // 1. שמירה ב-Firestore
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', user.uid);
                await setDoc(docRef, payload);
                
                // 2. שליחה ל-Google Sheets (עם טיפול בשגיאות)
                if (GOOGLE_SHEET_URL) {
                    // יצירת טופס וירטואלי לשליחה אמינה יותר
                    const formData = new FormData();
                    for (const key in payload) {
                        formData.append(key, payload[key]);
                    }

                    await fetch(GOOGLE_SHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        body: formData
                    });
                }

                status.innerText = "העבודה נשלחה ונשמרה בהצלחה! 🎉";
                status.style.color = "#059669";
            } catch (e) {
                console.error("Save error:", e);
                status.innerText = "שגיאה בשמירה. נסה שוב.";
                status.style.color = "#dc2626";
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        };

        window.selectOption = (id) => {
            document.querySelectorAll('.mission-card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById('card-' + id);
            if(card) card.classList.add('active');
            document.getElementById('form-container').classList.remove('hide');
            document.querySelectorAll('.form-content').forEach(c => c.classList.add('hide'));
            const content = document.getElementById('content-' + id);
            if(content) content.classList.remove('hide');
        };

        document.getElementById('save-btn').onclick = window.saveData;

        // Chart
        const ctx = document.getElementById('biodiversityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1','2','3','4','5','6','7'],
                datasets: [{ 
                    label: 'מגוון ביולוגי', 
                    data: [12, 28, 75, 130, 190, 230, 275], 
                    borderColor: '#059669', 
                    fill: true, 
                    backgroundColor: 'rgba(5, 150, 105, 0.1)',
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
